<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admina - Fryzjer Aleksander</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
</head>

<body>
<div id="login-page">
    <div class="lines"></div>
    <div class="login-box">
      <div class="login-logo">
        Fryzjer Aleksander
        <span>✦ Panel Administracyjny</span>
      </div>
      <div class="login-divider"></div>
      <label class="login-label">Adres e-mail</label>
      <input type="email" id="login-email" class="login-input">
      <label class="login-label">Hasło</label>
      <input type="password" id="login-password" class="login-input">
      <button class="login-btn" onClick="login()">Zaloguj się</button>
      <div class="login-error" id="login-error">Nieprawidłowy email lub hasło</div>
    </div>
</div>

<div id="dashboard">
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
